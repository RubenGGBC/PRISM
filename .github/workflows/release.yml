name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build PRISM
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download Go dependencies
        run: go mod download

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare Embedded Assets
        run: |
          New-Item -ItemType Directory -Force -Path "internal\server\frontend\dist"
          Copy-Item -Recurse -Force "frontend\dist\*" "internal\server\frontend\dist\"

      - name: Build PRISM (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          go build -ldflags "-s -w" -o "dist\prism-windows.exe" .

      - name: Build Installer (Windows)
        run: |
          go build -ldflags "-s -w -H windowsgui" -o "dist\prism-installer-windows.exe" .\cmd\installer

      - name: Create Release Package
        run: |
          $releaseDir = "dist\prism-release-windows"
          New-Item -ItemType Directory -Force -Path $releaseDir
          Copy-Item "dist\prism-windows.exe" "$releaseDir\prism.exe"
          Copy-Item "dist\prism-installer-windows.exe" "$releaseDir\prism-installer.exe"
          Copy-Item "README.md" "$releaseDir\README.md"
          Copy-Item "DISTRIBUTION.md" "$releaseDir\DISTRIBUTION.md"

      - name: Create ZIP
        run: |
          Compress-Archive -Path "dist\prism-release-windows\*" -DestinationPath "dist\prism-windows.zip"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-windows
          path: |
            dist/prism-windows.zip
            dist/prism-windows.exe
            dist/prism-installer-windows.exe

  build-linux:
    name: Build PRISM (Linux)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download Go dependencies
        run: go mod download

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare Embedded Assets
        run: |
          mkdir -p internal/server/frontend/dist
          cp -r frontend/dist/* internal/server/frontend/dist/

      - name: Build PRISM (Linux)
        run: |
          mkdir -p dist
          go build -ldflags "-s -w" -o "dist/prism-linux" .

      - name: Create Release Package
        run: |
          mkdir -p dist/prism-release-linux
          cp dist/prism-linux dist/prism-release-linux/prism
          cp README.md dist/prism-release-linux/
          cp DISTRIBUTION.md dist/prism-release-linux/
          chmod +x dist/prism-release-linux/prism

      - name: Create TAR
        run: |
          cd dist
          tar -czf prism-linux.tar.gz -C prism-release-linux .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prism-linux
          path: |
            dist/prism-linux.tar.gz
            dist/prism-linux

  release:
    name: Create GitHub Release
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: prism-windows
          path: artifacts/windows

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: prism-linux
          path: artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/prism-windows.zip
            artifacts/windows/prism-installer-windows.exe
            artifacts/linux/prism-linux.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## PRISM Release ${{ github.ref_name }}

            ### Windows Installation (Recommended)
            1. Download `prism-installer-windows.exe`
            2. Run as administrator
            3. Follow the wizard

            ### Linux Installation
            1. Download `prism-linux.tar.gz`
            2. Extract: `tar -xzf prism-linux.tar.gz`
            3. Move to PATH: `sudo mv prism /usr/local/bin/`
            4. Make executable: `chmod +x /usr/local/bin/prism`

            ### Quick Start
            ```bash
            cd your-project
            prism start
            ```

            Then open http://localhost:8080

            ### What's New
            See release notes below for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
